<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peoples Banking | Auth</title>

<!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- External CSS -->
<link rel="stylesheet" href="styles/styles.css">

</head>
<body>

<div id="customAlert" class="alert"></div>

<!-- LOGO -->
<div class="logo">
    <i class="fa-brands fa-first-order-alt"></i>
    <span>PB</span>
</div>

<!-- AUTH CARD -->
<div class="auth-container">

    <div class="toggle-buttons">
        <button id="signupBtn" class="toggle active">Sign Up</button>
        <button id="signinBtn" class="toggle">Sign In</button>
    </div>

    <!-- SIGN UP -->
    <div id="signupForm">
        <h1>Open Your Account</h1>
        <form>
            <div class="input-group">
                <input type="email" id="signupEmail" required>
                <label>Email</label>
            </div>
            <div class="input-group">
                <input type="password" id="signupPassword" required>
                <label>Password</label>
                <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePassword('signupPassword', this)"></i>
            </div>
            <div class="input-group">
                <input type="password" id="confirmPassword" required>
                <label>Confirm Password</label>
                <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
            </div>
            <button class="submit-btn">Create Account <span class="arrow">&#8594;</span></button>
        </form>
    </div>

    <!-- SIGN IN -->
    <div id="signinForm" class="signin-form">
        <h1>Access Account</h1>
        <form>
            <div class="input-group">
                <input type="email" id="signinEmail" required>
                <label>Email</label>
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" required>
                <label>Password</label>
                <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePassword('loginPassword', this)"></i>
            </div>
            <button class="submit-btn">Login <span class="arrow">&#8594;</span></button>
        </form>
    </div>

</div>

<!-- FOOTER -->
<footer>
    <div class="footer-bottom">
        <a href="terms.html">Terms & Conditions</a>
        <a id="contactLink">Contact Us</a>
    </div>
</footer>

<!-- CONTACT POPUP -->
<div id="contactPopup" class="popup">
    <h3>Contact Us</h3>
    <p><i class="fa-solid fa-envelope"></i> peoplesbanking@gmail.com</p>
    <p><i class="fa-solid fa-phone"></i> (+27) 61 662 2899</p>
    <button onclick="closePopup()">Close</button>
</div>

<!-- Firebase + JS -->
<script type="module" src="scripts/script.js"></script>

</body>
</html>
